<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Link - 輕鬆入門版</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --tile-color: #1e293b;
            --border-color: #334155;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --red: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #grid {
            display: grid;
            gap: 12px;
            background-color: var(--border-color);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .tile {
            width: 80px;
            height: 80px;
            background-color: var(--tile-color);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile:hover { background-color: #2d3e50; }

        .pipe-line {
            stroke: #475569;
            stroke-width: 14;
            fill: none;
            stroke-linecap: round;
        }

        .light-path {
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
            filter: blur(1px);
        }

        #message {
            margin: 20px 0;
            font-size: 1.2rem;
            height: 30px;
            color: #fbbf24;
            font-weight: bold;
        }

        .btn {
            padding: 12px 24px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>LUMINA LINK</h1>
    <p>Level 1: 簡單直線 (點擊方塊使其變水平)</p>
    
    <div id="message"></div>
    <div id="grid"></div>

    <div style="margin-top: 20px;">
        <button class="btn" onclick="location.reload()">重新開始</button>
    </div>

<script>
    const COLORS = { RED: '#ef4444', NONE: 'transparent' };
    
    // 第一關數據：直線連接
    const level1 = [
        { type: 'source', pos: [0,0], rot: 1 }, // 固定朝右
        { type: 'path',   pos: [0,1], rot: 0 }, // 初始垂直 (點一下變水平)
        { type: 'path',   pos: [0,2], rot: 0 }, // 初始垂直 (點一下變水平)
        { type: 'target', pos: [0,3], rot: 3 }  // 目標在最右邊
    ];

    let gameState = [];

    function init() {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = 'repeat(4, 80px)';
        
        level1.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'tile';
            div.style.transform = `rotate(${t.rot * 90}deg)`;
            
            // 繪製直線管道
            div.innerHTML = `
                <svg viewBox="0 0 80 80" style="width:100%;height:100%">
                    <line x1="0" y1="40" x2="80" y2="40" class="pipe-line" />
                    <line x1="0" y1="40" x2="80" y2="40" class="light-path" id="light-${i}" stroke="transparent" />
                    ${t.type === 'source' ? '<circle cx="10" cy="40" r="8" fill="#ef4444"/>' : ''}
                    ${t.type === 'target' ? '<circle cx="40" cy="40" r="15" fill="none" stroke="#ef4444" stroke-width="4"/>' : ''}
                </svg>
            `;

            if(t.type === 'path') {
                div.onclick = () => rotate(i);
            }
            
            grid.appendChild(div);
            gameState.push({ ...t, element: div });
        });
        update();
    }

    function rotate(idx) {
        gameState[idx].rot = (gameState[idx].rot + 1) % 4;
        gameState[idx].element.style.transform = `rotate(${gameState[idx].rot * 90}deg)`;
        update();
    }

    function update() {
        // 重置光效
        gameState.forEach((_, i) => {
            const l = document.getElementById(`light-${i}`);
            if(l) l.setAttribute('stroke', 'transparent');
        });

        // 簡單邏輯檢測：如果所有方塊 rot 都是 1 (水平)，則通關
        // 在這簡化版中，只要方塊1和2是水平的(rot 1 或 3)，光就傳得過去
        let p1 = gameState[1].rot % 2 === 1;
        let p2 = gameState[2].rot % 2 === 1;

        if(p1) document.getElementById('light-1').setAttribute('stroke', COLORS.RED);
        if(p1 && p2) {
            document.getElementById('light-2').setAttribute('stroke', COLORS.RED);
            document.getElementById('message').innerText = "太棒了！紅光成功接通！";
        } else {
            document.getElementById('message').innerText = "";
        }
    }

    init();
</script>
</body>
</html>
