                <button id="helpButton" class="overlay-button">幫助</button>
                <button id="backFromSettings" class="overlay-button">返回上一頁</button>
            </div>
        </div>

        <!-- Help Overlay -->
        <div id="helpOverlay" class="overlay">
            <div class="overlay-content">
                <h2>幫助</h2>
                <p>提示: 開始按鈕藏在easy game之後</p>
                <button id="backFromHelp" class="overlay-button">返回上一頁</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mainTitle = document.getElementById('mainTitle');
            const startGameButton = document.getElementById('startGameButton');
            const settingsIcon = document.getElementById('settingsIcon');
            const settingsOverlay = document.getElementById('settingsOverlay');
            const backFromSettings = document.getElementById('backFromSettings');
            const volumeControl = document.getElementById('volumeControl');
            const volumeValue = document.getElementById('volumeValue');
            const helpButton = document.getElementById('helpButton');
            const helpOverlay = document.getElementById('helpOverlay');
            const backFromHelp = document.getElementById('backFromHelp');

            mainTitle.addEventListener('click', () => {
                startGameButton.classList.add('active');
            });

            settingsIcon.addEventListener('click', () => {
                settingsOverlay.style.display = 'flex';
            });

            backFromSettings.addEventListener('click', () => {
                settingsOverlay.style.display = 'none';
            });

            volumeControl.addEventListener('input', (event) => {
                volumeValue.textContent = event.target.value;
                console.log('Volume set to:', event.target.value);
            });

            helpButton.addEventListener('click', () => {
                settingsOverlay.style.display = 'none';
                helpOverlay.style.display = 'flex';
            });

            backFromHelp.addEventListener('click', () => {
                helpOverlay.style.display = 'none';
                settingsOverlay.style.display = 'flex';
            });
        });
    </script>
</body>

    <div class="container">
        <div class="game-title-area">
            <h1 id="mainTitle" class="main-title">easy game 2.0</h1>
            <div id="startGameButton" class="start-game-hidden">
                <button>開始遊戲</button>
            </div>

            <i class="fas fa-cog"></i>

                    <span>音量大小:</span>
                    <input type="range" id="volumeControl" min="0" max="100" value="100">
                    <span id="volumeValue">100</span>
                </div>
                <button id="helpButton" class="overlay-button">幫助</button>
                <button id="backFromSettings" class="overlay-button">返回上一頁</button>
            </div>
        </div>

            <div class="overlay-content">
                <h2>幫助</h2>
                <p>提示: 開始按鈕藏在easy game之後</p>
                <button id="backFromHelp" class="overlay-button">返回上一頁</button>
            </div>
        </div>

        <!-- Level Selection Overlay -->
        <div id="levelOverlay" class="overlay">
            <div class="overlay-content level-selection-content">
                <h2>選擇關卡</h2>
                <div class="level-grid">
                    <div class="level-item" data-level="1">1</div>
                    <div class="level-item" data-level="2">2</div>
                    <div class="level-item" data-level="3">3</div>
                    <div class="level-item" data-level="4">4</div>
                    <div class="level-item" data-level="5">5</div>
                </div>
                <button id="backFromLevel" class="overlay-button">返回首頁</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mainTitle = document.getElementById('mainTitle');
            const startGameButton = document.getElementById('startGameButton');

            const backFromSettings = document.getElementById('backFromSettings');

            const levelItems = document.querySelectorAll('.level-item');

            mainTitle.addEventListener('click', () => {
                startGameButton.classList.add('active');
            });

                levelOverlay.style.display = 'flex';

                levelOverlay.style.display = 'none';
                startGameButton.classList.add('active');
            });

                    const level = item.getAttribute('data-level');
                    alert(`你選擇了關卡 ${level}`);
                });
            });

            settingsIcon.addEventListener('click', () => {
                settingsOverlay.style.display = 'flex';
            });

            backFromSettings.addEventListener('click', () => {
                settingsOverlay.style.display = 'none';
            });

            });
